version: "3.9"

services:
  # FastAPI Backend
  api:
    build: .
    container_name: ai-video-editor-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - .:/app
    depends_on:
      - redis
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  # Streamlit Frontend
  frontend:
    build: .
    container_name: ai-video-editor-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - .:/app
    depends_on:
      - api
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0

  # Celery Worker (for async video rendering)
  worker:
    build: .
    container_name: ai-video-editor-worker
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - .:/app
    depends_on:
      - redis
    command: celery -A backend.tasks worker --loglevel=info --concurrency=2

  # Redis (message broker for Celery)
  redis:
    image: redis:7-alpine
    container_name: ai-video-editor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
